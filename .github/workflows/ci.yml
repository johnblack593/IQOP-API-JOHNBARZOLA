name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .
        # E501 ignorado: líneas largas en stable_api legacy son aceptables
        # W503 ignorado: line break before binary operator (estilo legacy)

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .[dev]

      - name: Verify installation integrity
        run: |
          python -c "import certifi; print('certifi:', certifi.__version__)"
          python -c "import httpx; print('httpx:', httpx.__version__)"
          python -c "import iqoptionapi; print('sdk:', iqoptionapi.__version__)"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning \
            --cov=iqoptionapi \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  security-audit:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[dev]" || pip install -e . || pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc --skip-editable

  integration-test:
    name: Integration tests (IQ Option live)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .[dev]
      - name: Run integration tests
        env:
          IQOP_EMAIL: ${{ secrets.IQOP_EMAIL }}
          IQOP_PASSWORD: ${{ secrets.IQOP_PASSWORD }}
        run: |
          python -m pytest tests/integration/ -v \
            --tb=short \
            -m integration \
            --timeout=60
