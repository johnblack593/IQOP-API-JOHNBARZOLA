name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .
        # E501 ignorado: líneas largas en stable_api legacy son aceptables
        # W503 ignorado: line break before binary operator (estilo legacy)

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e .[dev]

      - name: Verify installation integrity
        run: |
          python -c "import certifi; print('certifi:', certifi.__version__)"
          python -c "import httpx; print('httpx:', httpx.__version__)"
          python -c "import iqoptionapi; print('sdk:', iqoptionapi.__version__)"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning
        # filterwarnings también declarados en pyproject.toml — explícito aquí
        # para visibilidad en el log de CI sin necesidad de leer pyproject.toml
