name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check iqoptionapi/ --select E,F,W --ignore E501,W503
        # E501 ignorado: líneas largas en stable_api legacy son aceptables
        # W503 ignorado: line break before binary operator (estilo legacy)

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e . && pip install pytest
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short
        # Solo tests unitarios — sin internet, sin credenciales
