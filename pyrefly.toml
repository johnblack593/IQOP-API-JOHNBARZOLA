[tool.pyrefly]
project_root = "."
python_version = "3.9"
search_path = ["iqoptionapi"]
exclude = [
  "examples/**",
  "tests/**",
  "**/__pycache__/**",
  "**/*.pyc"
]

[tool.pyrefly.suppress]
# Suppress inmemory fragment false positives from VS Code hover analysis
parse-error = false
unknown-name = false
